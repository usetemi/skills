name: copier-drift

on:
  pull_request:
    paths:
      - "template/**"
      - "skills/**/.copier-answers.yml"
      - "skills/**/src/**"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install copier
        run: pipx install copier

      - name: Configure git for copier update
        # copier update reads the destination as a Git working tree; CI checkout has
        # default identity unset, so set a placeholder for any internal commit objects.
        run: |
          git config user.email "copier-drift@ci.local"
          git config user.name "copier-drift"

      - name: Re-render every skill from the current template
        run: |
          set -euo pipefail
          for skill in skills/*/; do
            if [ -f "$skill/.copier-answers.yml" ]; then
              echo "::group::copier update $skill"
              (cd "$skill" && copier update --defaults --trust)
              echo "::endgroup::"
            fi
          done

      - name: Fail if rendered files drifted
        run: |
          if ! git diff --exit-code skills/; then
            echo "::error::Rendered files diverged from template/. Run 'copier update --defaults --trust' in each affected skill and commit the result."
            exit 1
          fi
