name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  zip-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build per-skill zips
        run: |
          set -euo pipefail
          mkdir -p dist
          for skill_dir in skills/*/; do
            skill_name="$(basename "$skill_dir")"
            (cd skills && zip -r "../dist/${skill_name}.zip" "$skill_name" \
              -x "*/.venv/*" "*/.ruff_cache/*" "*/__pycache__/*" "*/dist/*" "*/*.egg-info/*")
            echo "Built dist/${skill_name}.zip"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          fail_on_unmatched_files: true
          body: |
            ## Install in Claude Cowork or Claude Desktop

            1. Download the zip for the skill you want from the assets below.
            2. Open Claude Cowork or Claude Desktop.
            3. Go to **Settings → Capabilities → Skills**.
            4. Click **+ Create skill** and upload the zip.

            ## Install in Claude Code

            ```
            /plugin marketplace add usetemi/skills
            /plugin install skills@usetemi
            ```

            ## Install via skills.sh (Codex, Cursor, Gemini CLI, and others)

            ```
            npx skills add usetemi/skills
            ```

            ## Updating

            - **Claude Code**: enable auto-update for the `usetemi` marketplace via the `/plugin` UI, or re-run `/plugin install skills@usetemi`.
            - **skills.sh**: `npx skills update` (works for global installs).
            - **Claude Cowork or Claude Desktop**: download the new zip from this release, then use **Upload and Replace** on the existing skill (three-dot menu in Customize → Skills).
